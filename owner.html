<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Прокат — владелец</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap');

  :root{
    --bg:#111417; --surface:#1A1E22; --surface-2:#20252A; --surface-3:#262B31;
    --ink:#EDEFF0; --ink-soft:#8C949C; --ink-faint:#565D64;
    --accent:#F5A300; --accent-dark:#D88C00; --accent-soft:rgba(245,163,0,.13);
    --accent-2:#38A89D; --accent-2-soft:rgba(56,168,157,.14);
    --warn:#D98324; --warn-soft:rgba(217,131,36,.14);
    --danger:#E5484D; --danger-soft:rgba(229,72,77,.14);
    --line:#2A2F35; --line-strong:#3A414A;
    --radius:14px; --radius-sm:10px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{background:var(--bg); color:var(--ink); font-family:'Inter',sans-serif; font-size:15px; line-height:1.4; min-height:100vh; padding-bottom:calc(74px + var(--safe-bottom));}
  .mono{font-family:'JetBrains Mono',monospace;}
  h1,h2,h3{font-family:'Chakra Petch',sans-serif; font-weight:600;}
  button{font-family:inherit; border:none; cursor:pointer; background:none; color:inherit;}

  .power-rail{height:3px; background:linear-gradient(90deg, var(--accent-dark), var(--accent), var(--accent-2));}
  .topbar{position:sticky; top:0; z-index:30; padding:calc(14px + var(--safe-top)) 18px 14px; background:var(--surface); border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .brand{display:flex; align-items:center; gap:11px;}
  .brand-mark{width:36px; height:36px; border-radius:8px; background:var(--surface-3); border:1px solid var(--line-strong); display:flex; align-items:center; justify-content:center; color:var(--accent);}
  .brand-mark svg{width:18px; height:18px;}
  .brand-name{font-family:'Chakra Petch',sans-serif; font-size:14.5px; font-weight:700; text-transform:uppercase; letter-spacing:.02em;}
  .brand-sub{font-size:10.5px; color:var(--ink-faint); margin-top:2px; font-family:'JetBrains Mono',monospace;}
  .role-badge{font-family:'JetBrains Mono',monospace; font-size:10.5px; font-weight:700; padding:5px 10px; border-radius:6px; background:var(--accent-2-soft); color:var(--accent-2); text-transform:uppercase; letter-spacing:.04em;}

  .screen{padding:16px 16px 8px; display:none;}
  .screen.active{display:block;}
  .section-label{display:flex; align-items:center; gap:8px; font-family:'JetBrains Mono',monospace; font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-faint); font-weight:600; margin:22px 2px 10px;}
  .section-label:first-child{margin-top:2px;}
  .section-label::after{content:''; flex:1; height:1px; background:var(--line);}

  .tabbar{position:fixed; left:0; right:0; bottom:0; z-index:40; background:var(--surface); border-top:1px solid var(--line); padding:8px 10px calc(8px + var(--safe-bottom)); display:flex; gap:4px;}
  .tab{flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; padding:7px 4px; border-radius:10px; color:var(--ink-faint);}
  .tab svg{width:20px; height:20px;}
  .tab span{font-family:'JetBrains Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:.03em; font-weight:600;}
  .tab.active{color:var(--accent);}

  .period-row{display:flex; gap:6px; margin-bottom:14px;}
  .period-opt{flex:1; padding:9px; text-align:center; border-radius:8px; background:var(--surface-2); border:1px solid var(--line); font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600; color:var(--ink-soft);}
  .period-opt.active{background:var(--accent-soft); color:var(--accent); border-color:var(--accent);}

  .kpi-card{background:var(--surface); border:1px solid var(--accent); border-radius:var(--radius); padding:16px; margin-bottom:10px;}
  .kpi-lbl{font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--ink-faint); text-transform:uppercase; letter-spacing:.05em;}
  .kpi-val{font-family:'JetBrains Mono',monospace; font-size:30px; font-weight:700; color:var(--accent); margin-top:4px;}
  .kpi-sub{font-size:12px; color:var(--ink-soft); margin-top:4px;}

  .stat-row{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:4px;}
  .stat-card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-sm); padding:12px 13px;}
  .stat-card .lbl{font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--ink-faint); text-transform:uppercase; letter-spacing:.04em;}
  .stat-card .val{font-family:'JetBrains Mono',monospace; font-size:18px; font-weight:700; margin-top:4px;}

  /* ---------- Revenue bars ---------- */
  .chart-card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:16px 14px 10px; margin-bottom:6px;}
  .chart-bars{display:flex; align-items:flex-end; gap:8px; height:110px;}
  .bar-col{flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; height:100%; justify-content:flex-end;}
  .bar{width:100%; border-radius:4px 4px 2px 2px; background:linear-gradient(180deg, var(--accent), var(--accent-dark)); min-height:4px;}
  .bar-day{font-family:'JetBrains Mono',monospace; font-size:9.5px; color:var(--ink-faint); text-transform:uppercase;}

  /* ---------- Top models list ---------- */
  .top-row{display:flex; align-items:center; gap:12px; padding:11px 0; border-bottom:1px solid var(--line);}
  .top-row:last-child{border-bottom:none;}
  .top-rank{font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:700; color:var(--ink-faint); width:18px; flex:0 0 auto;}
  .top-mid{flex:1; min-width:0;}
  .top-name{font-size:13.5px; font-weight:600;}
  .top-bar-track{height:4px; border-radius:3px; background:var(--surface-3); margin-top:6px; overflow:hidden;}
  .top-bar-fill{height:100%; background:var(--accent-2); border-radius:3px;}
  .top-val{font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:700; flex:0 0 auto;}

  /* ---------- Utilization ---------- */
  .util-row{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-sm); padding:13px 14px; margin-bottom:8px;}
  .util-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;}
  .util-name{font-weight:700; font-size:13.5px;}
  .util-pct{font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:700;}
  .util-pct.high{color:var(--accent-2);}
  .util-pct.mid{color:var(--warn);}
  .util-pct.low{color:var(--ink-faint);}
  .util-track{height:7px; border-radius:4px; background:var(--surface-3); overflow:hidden;}
  .util-fill{height:100%; border-radius:4px;}
  .util-fill.high{background:var(--accent-2);}
  .util-fill.mid{background:var(--warn);}
  .util-fill.low{background:var(--ink-faint);}
  .util-note{font-size:11px; color:var(--ink-faint); margin-top:6px; font-family:'JetBrains Mono',monospace;}

  /* ---------- Overdue ---------- */
  .overdue-row{background:var(--surface); border:1px solid var(--danger); border-radius:var(--radius-sm); padding:13px 14px; margin-bottom:8px;}
  .overdue-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
  .overdue-model{font-weight:700; font-size:14px;}
  .overdue-client{font-size:12px; color:var(--ink-soft); margin-top:2px;}
  .overdue-days{font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700; padding:3px 8px; border-radius:5px; background:var(--danger-soft); color:var(--danger); white-space:nowrap;}
  .overdue-actions{display:flex; gap:8px; margin-top:11px;}
  .btn{display:flex; align-items:center; justify-content:center; gap:8px; padding:11px 14px; border-radius:var(--radius-sm); font-size:12.5px; font-weight:700; font-family:'Chakra Petch',sans-serif; text-transform:uppercase; letter-spacing:.03em; flex:1;}
  .btn-primary{background:var(--accent); color:#15130A;}
  .btn-ghost{background:var(--surface-3); color:var(--ink); border:1px solid var(--line-strong);}

  .empty-state{text-align:center; padding:44px 20px; color:var(--ink-faint);}
  .empty-state svg{width:34px; height:34px; margin-bottom:10px; opacity:.5;}

  .loading-screen{position:fixed; inset:0; background:var(--bg); z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;}
  .spinner{width:24px; height:24px; border-radius:4px; border:3px solid var(--line-strong); border-top-color:var(--accent); animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-screen span{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--ink-faint); text-transform:uppercase; letter-spacing:.06em;}

  .toast{position:fixed; left:16px; right:16px; bottom:calc(84px + var(--safe-bottom)); background:var(--surface-3); border:1px solid var(--line-strong); color:var(--ink); padding:13px 16px; border-radius:10px; font-size:13.5px; font-weight:600; z-index:200; transform:translateY(120%); transition:transform .25s ease; display:flex; align-items:center; gap:8px;}
  .toast.show{transform:translateY(0);}
</style>
</head>
<body>
<div class="power-rail"></div>
<div class="loading-screen" id="loadingScreen"><div class="spinner"></div><span>Инициализация…</span></div>

<div id="app" style="display:none;">
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg></div>
      <div><div class="brand-name" id="brandName">Прокат-Инструмент</div><div class="brand-sub">ОБЗОР БИЗНЕСА</div></div>
    </div>
    <div class="role-badge">ВЛАДЕЛЕЦ</div>
  </div>

  <!-- ===================== ОБЗОР ===================== -->
  <div class="screen active" id="screen-overview">
    <div class="period-row" id="periodRow"></div>

    <div class="kpi-card">
      <div class="kpi-lbl">Выручка</div>
      <div class="kpi-val mono" id="kpiRevenue">0 р.</div>
      <div class="kpi-sub" id="kpiSub">за сегодня</div>
    </div>
    <div class="stat-row">
      <div class="stat-card"><div class="lbl">Броней</div><div class="val" id="statCount">0</div></div>
      <div class="stat-card"><div class="lbl">Средний чек</div><div class="val" id="statAvg">0 р.</div></div>
    </div>

    <div class="section-label">Выручка за 7 дней</div>
    <div class="chart-card"><div class="chart-bars" id="chartBars"></div></div>

    <div class="section-label">Топ инструментов по выручке</div>
    <div class="chart-card" id="topList"></div>
  </div>

  <!-- ===================== УТИЛИЗАЦИЯ ===================== -->
  <div class="screen" id="screen-util">
    <div class="section-label">Загрузка инвентаря (30 дней)</div>
    <div id="utilList"></div>
  </div>

  <!-- ===================== ПРОСРОЧКИ ===================== -->
  <div class="screen" id="screen-overdue">
    <div class="section-label">Просроченные возвраты</div>
    <div id="overdueList"></div>
  </div>

  <div class="tabbar">
    <button class="tab active" data-screen="overview">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18M7 15l4-5 3 3 5-7"/></svg>
      <span>Обзор</span>
    </button>
    <button class="tab" data-screen="util">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      <span>Утилизация</span>
    </button>
    <button class="tab" data-screen="overdue">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4M12 17h.01"/><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>
      <span>Просрочки</span>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================ CONFIG ============================================================ */
const CONFIG = { businessName: "Прокат-Инструмент", apiUrl: "PASTE_APPS_SCRIPT_URL_HERE" };

/* ============================================================ MOCK DATA ============================================================ */
const MOCK_OVERVIEW = {
  today: { revenue: 214, count: 6 },
  week: { revenue: 1380, count: 34 },
  month: { revenue: 5240, count: 121 },
  week7: [
    { day: "ПН", revenue: 120 }, { day: "ВТ", revenue: 180 }, { day: "СР", revenue: 90 },
    { day: "ЧТ", revenue: 260 }, { day: "ПТ", revenue: 310 }, { day: "СБ", revenue: 340 }, { day: "ВС", revenue: 80 }
  ],
  topModels: [
    { name: "Перфоратор Bosch GBH 2-26", revenue: 1120 },
    { name: "Болгарка Makita 230мм", revenue: 860 },
    { name: "Триммер бензиновый", revenue: 640 },
    { name: "Бетономешалка 130л", revenue: 520 },
    { name: "Строительные леса 4×2м", revenue: 410 }
  ]
};

const MOCK_UTILIZATION = [
  { name: "Перфоратор Bosch GBH 2-26", totalQty: 5, pct: 82 },
  { name: "Болгарка Makita 230мм", totalQty: 4, pct: 64 },
  { name: "Триммер бензиновый", totalQty: 6, pct: 51 },
  { name: "Бетономешалка 130л", totalQty: 2, pct: 38 },
  { name: "Строительные леса 4×2м", totalQty: 3, pct: 22 },
  { name: "Лазерный нивелир", totalQty: 4, pct: 9 }
];

const MOCK_OVERDUE = [
  { id: "ЗК-1039", model: "Перфоратор Bosch GBH 2-26", client: "Дмитрий Волк", phone: "+375 33 555 66 77", to: "2026-07-14", daysLate: 6 },
];

/* ============================================================ api(action, payload) ============================================================ */
function api(action, payload) {
  return new Promise((resolve) => {
    setTimeout(() => {
      switch (action) {
        case "getOverview": resolve({ ok: true, data: MOCK_OVERVIEW }); break;
        case "getUtilization": resolve({ ok: true, list: MOCK_UTILIZATION }); break;
        case "getOverdue": resolve({ ok: true, list: MOCK_OVERDUE }); break;
        case "nudgeClient": resolve({ ok: true }); break;
        default: resolve({ ok: false, error: "unknown action" });
      }
    }, 220);
  });
}

/* ============================================================ TELEGRAM ============================================================ */
const tg = window.Telegram ? window.Telegram.WebApp : null;
function haptic(style) { if (tg && tg.HapticFeedback) { if (["success","error","warning"].includes(style)) tg.HapticFeedback.notificationOccurred(style); else tg.HapticFeedback.impactOccurred(style || "light"); } }
function setChrome() { if (!tg) return; const s = getComputedStyle(document.body); try { tg.setHeaderColor(s.getPropertyValue("--surface").trim()); tg.setBackgroundColor(s.getPropertyValue("--bg").trim()); } catch(e){} }
function initTelegram() { if (!tg) return; tg.ready(); tg.expand(); setChrome(); }
function toast(msg){ const t = document.getElementById("toast"); t.textContent = msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"), 2200); }
function fmtDate(iso){ const d = new Date(iso); return d.toLocaleDateString("ru-RU",{day:"2-digit",month:"2-digit"}); }

/* ============================================================ TABS ============================================================ */
document.querySelectorAll(".tab").forEach(el => el.addEventListener("click", () => {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("screen-" + el.dataset.screen).classList.add("active");
  haptic("light");
  if (el.dataset.screen === "util") loadUtilization();
  if (el.dataset.screen === "overdue") loadOverdue();
}));

/* ============================================================ ОБЗОР ============================================================ */
let period = "today";
const PERIODS = [{ id: "today", name: "СЕГОДНЯ" }, { id: "week", name: "НЕДЕЛЯ" }, { id: "month", name: "МЕСЯЦ" }];
function renderPeriods() {
  const row = document.getElementById("periodRow");
  row.innerHTML = PERIODS.map(p => `<button class="period-opt ${p.id === period ? "active" : ""}" data-p="${p.id}">${p.name}</button>`).join("");
  row.querySelectorAll(".period-opt").forEach(el => el.addEventListener("click", () => { period = el.dataset.p; haptic("light"); renderPeriods(); renderOverview(); }));
}
let overviewData = null;
async function loadOverview() {
  const res = await api("getOverview", {});
  overviewData = res.data;
  renderPeriods();
  renderOverview();
  renderChart();
  renderTop();
}
function renderOverview() {
  const d = overviewData[period];
  const subLabel = { today: "за сегодня", week: "за 7 дней", month: "за 30 дней" };
  document.getElementById("kpiRevenue").textContent = d.revenue + " р.";
  document.getElementById("kpiSub").textContent = subLabel[period];
  document.getElementById("statCount").textContent = d.count;
  document.getElementById("statAvg").textContent = Math.round(d.revenue / d.count) + " р.";
}
function renderChart() {
  const wrap = document.getElementById("chartBars");
  const max = Math.max(...overviewData.week7.map(d => d.revenue));
  wrap.innerHTML = overviewData.week7.map(d => `
    <div class="bar-col">
      <div class="bar" style="height:${Math.max(6, (d.revenue / max) * 100)}%"></div>
      <div class="bar-day">${d.day}</div>
    </div>`).join("");
}
function renderTop() {
  const wrap = document.getElementById("topList");
  const max = overviewData.topModels[0].revenue;
  wrap.innerHTML = overviewData.topModels.map((m, i) => `
    <div class="top-row">
      <div class="top-rank">${i + 1}</div>
      <div class="top-mid">
        <div class="top-name">${m.name}</div>
        <div class="top-bar-track"><div class="top-bar-fill" style="width:${(m.revenue / max) * 100}%"></div></div>
      </div>
      <div class="top-val">${m.revenue} р.</div>
    </div>`).join("");
}

/* ============================================================ УТИЛИЗАЦИЯ ============================================================ */
async function loadUtilization() {
  const res = await api("getUtilization", {});
  const wrap = document.getElementById("utilList");
  wrap.innerHTML = res.list.map(m => {
    const cls = m.pct >= 60 ? "high" : m.pct >= 30 ? "mid" : "low";
    return `
    <div class="util-row">
      <div class="util-top"><div class="util-name">${m.name}</div><div class="util-pct ${cls} mono">${m.pct}%</div></div>
      <div class="util-track"><div class="util-fill ${cls}" style="width:${m.pct}%"></div></div>
      <div class="util-note">${m.totalQty} ЕД. В ПАРКЕ</div>
    </div>`;
  }).join("");
}

/* ============================================================ ПРОСРОЧКИ ============================================================ */
async function loadOverdue() {
  const res = await api("getOverdue", {});
  const wrap = document.getElementById("overdueList");
  if (!res.list.length) {
    wrap.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M20 6L9 17l-5-5"/></svg><div>Просрочек нет</div></div>`;
    return;
  }
  wrap.innerHTML = res.list.map(o => `
    <div class="overdue-row">
      <div class="overdue-top">
        <div><div class="overdue-model">${o.model}</div><div class="overdue-client">${o.client} · ${o.phone}</div></div>
        <span class="overdue-days mono">+${o.daysLate} СУТ.</span>
      </div>
      <div style="font-size:11.5px; color:var(--ink-faint); margin-top:6px; font-family:'JetBrains Mono',monospace;">ПЛАН ВОЗВРАТА: ${fmtDate(o.to)}</div>
      <div class="overdue-actions">
        <button class="btn btn-primary" data-nudge="${o.id}">Напомнить клиенту</button>
        <a class="btn btn-ghost" href="tel:${o.phone.replace(/\\s/g,'')}">Позвонить</a>
      </div>
    </div>`).join("");
  wrap.querySelectorAll("[data-nudge]").forEach(el => el.addEventListener("click", async () => {
    await api("nudgeClient", { id: el.dataset.nudge });
    haptic("success");
    toast("Напоминание отправлено клиенту в Telegram");
  }));
}

/* ============================================================ INIT ============================================================ */
async function init() {
  initTelegram();
  document.getElementById("brandName").textContent = CONFIG.businessName;
  await loadOverview();
  document.getElementById("loadingScreen").style.display = "none";
  document.getElementById("app").style.display = "block";
}
init();
</script>
</body>
</html>
