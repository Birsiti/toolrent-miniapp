<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Прокат инструмента</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap');

  :root{
    --bg:#111417;
    --surface:#1A1E22;
    --surface-2:#20252A;
    --surface-3:#262B31;
    --ink:#EDEFF0;
    --ink-soft:#8C949C;
    --ink-faint:#565D64;
    --accent:#F5A300;
    --accent-dark:#D88C00;
    --accent-soft:rgba(245,163,0,.13);
    --accent-2:#38A89D;
    --accent-2-soft:rgba(56,168,157,.14);
    --warn:#D98324;
    --warn-soft:rgba(217,131,36,.14);
    --danger:#E5484D;
    --danger-soft:rgba(229,72,77,.14);
    --line:#2A2F35;
    --line-strong:#3A414A;
    --metal:#23272C;
    --rivet:#4A5158;
    --radius:14px;
    --radius-sm:10px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    font-size:15px;
    line-height:1.4;
    min-height:100vh;
    padding-bottom:calc(24px + var(--safe-bottom));
  }
  .mono{font-family:'JetBrains Mono',monospace;}
  h1,h2,h3,.display{font-family:'Chakra Petch',sans-serif; font-weight:600; letter-spacing:.01em;}

  button{font-family:inherit; border:none; cursor:pointer; background:none; color:inherit;}
  input,select,textarea{font-family:inherit; font-size:15px;}

  /* ---------- Power rail (top signal line) ---------- */
  .power-rail{height:3px; background:linear-gradient(90deg, var(--accent-dark), var(--accent), var(--accent-2)); }

  /* ---------- Header ---------- */
  .topbar{
    position:sticky; top:0; z-index:30;
    padding:calc(14px + var(--safe-top)) 18px 14px;
    background:var(--surface);
    border-bottom:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between;
    gap:10px;
  }
  .topbar .brand{display:flex; align-items:center; gap:11px; min-width:0;}
  .brand-mark{
    width:36px; height:36px; border-radius:8px; flex:0 0 auto;
    background:var(--surface-3); border:1px solid var(--line-strong);
    display:flex; align-items:center; justify-content:center;
    color:var(--accent);
  }
  .brand-mark svg{width:19px; height:19px;}
  .brand-name{font-family:'Chakra Petch',sans-serif; font-size:15px; font-weight:700; text-transform:uppercase; letter-spacing:.03em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .brand-sub{font-size:11px; color:var(--ink-soft); margin-top:2px; font-family:'JetBrains Mono',monospace;}
  .topbar-actions{display:flex; align-items:center; gap:6px; flex:0 0 auto;}
  .icon-btn{
    width:38px; height:38px; border-radius:9px;
    background:var(--surface-3); border:1px solid var(--line-strong);
    display:flex; align-items:center; justify-content:center;
    color:var(--ink);
  }
  .icon-btn svg{width:17px; height:17px;}
  .icon-btn.has-dot{position:relative;}
  .icon-btn.has-dot::after{
    content:''; position:absolute; top:5px; right:5px;
    width:7px; height:7px; border-radius:50%; background:var(--accent);
    box-shadow:0 0 0 2px var(--surface);
  }

  /* ---------- Layout ---------- */
  .screen{padding:16px 16px 8px;}
  .section-label{
    display:flex; align-items:center; gap:8px;
    font-family:'JetBrains Mono',monospace; font-size:11px; text-transform:uppercase; letter-spacing:.08em;
    color:var(--ink-faint); font-weight:600; margin:20px 2px 10px;
  }
  .section-label::after{content:''; flex:1; height:1px; background:var(--line);}
  .section-label:first-child{margin-top:2px;}

  /* ---------- Segmented category control ---------- */
  .seg-row{display:flex; gap:6px; overflow-x:auto; padding:2px 2px 4px; scrollbar-width:none;}
  .seg-row::-webkit-scrollbar{display:none;}
  .seg{
    flex:0 0 auto; padding:9px 14px; border-radius:8px;
    background:var(--surface-2); border:1px solid var(--line);
    font-size:12.5px; font-weight:600; color:var(--ink-soft);
    white-space:nowrap; font-family:'JetBrains Mono',monospace; letter-spacing:.01em;
  }
  .seg.active{background:var(--accent-soft); color:var(--accent); border-color:var(--accent);}

  /* ---------- Model spec-rows ---------- */
  .model-list{display:flex; flex-direction:column; gap:8px;}
  .model-row{
    display:flex; align-items:center; gap:12px;
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-sm);
    padding:12px 13px; text-align:left;
  }
  .model-row:active{border-color:var(--line-strong);}
  .model-icon{
    width:44px; height:44px; border-radius:9px; flex:0 0 auto;
    background:var(--surface-3); border:1px solid var(--line-strong);
    display:flex; align-items:center; justify-content:center; color:var(--accent-2);
  }
  .model-icon svg{width:21px; height:21px;}
  .model-mid{flex:1; min-width:0;}
  .model-name{font-size:13.5px; font-weight:700; line-height:1.3;}
  .model-cat{font-size:11px; color:var(--ink-faint); margin-top:1px; font-family:'JetBrains Mono',monospace;}
  .model-right{flex:0 0 auto; text-align:right;}
  .model-price{font-size:14.5px; font-weight:700; font-family:'JetBrains Mono',monospace;}
  .model-price span{font-size:10px; color:var(--ink-faint); font-weight:500; display:block; font-family:'Inter',sans-serif;}
  .stock-readout{
    margin-top:5px; display:inline-flex; align-items:center; gap:4px;
    font-family:'JetBrains Mono',monospace; font-size:10.5px; font-weight:700;
    padding:2px 7px; border-radius:5px;
    background:var(--accent-2-soft); color:var(--accent-2);
  }
  .stock-readout.low{background:var(--warn-soft); color:var(--warn);}
  .stock-readout.none{background:var(--danger-soft); color:var(--danger);}
  .stock-readout i{width:5px; height:5px; border-radius:50%; background:currentColor;}

  /* ---------- Buttons ---------- */
  .btn{
    display:flex; align-items:center; justify-content:center; gap:8px;
    width:100%; padding:15px 18px; border-radius:var(--radius-sm);
    font-size:14.5px; font-weight:700; font-family:'Chakra Petch',sans-serif; text-transform:uppercase; letter-spacing:.03em;
  }
  .btn-primary{background:var(--accent); color:#15130A;}
  .btn-primary:active{background:var(--accent-dark);}
  .btn-primary:disabled{background:var(--surface-3); color:var(--ink-faint);}
  .btn-ghost{background:var(--surface-3); color:var(--ink); border:1px solid var(--line-strong);}

  /* ---------- Wizard overlay ---------- */
  .wizard{
    position:fixed; inset:0; z-index:50; background:var(--bg);
    display:flex; flex-direction:column; transform:translateY(100%);
    transition:transform .28s cubic-bezier(.2,.8,.2,1);
  }
  .wizard.open{transform:translateY(0);}
  .wizard-head{
    padding:calc(14px + var(--safe-top)) 16px 12px;
    background:var(--surface); border-bottom:1px solid var(--line);
    display:flex; align-items:center; gap:12px;
  }
  .wizard-title{font-family:'Chakra Petch',sans-serif; font-size:14.5px; font-weight:700; flex:1; text-transform:uppercase; letter-spacing:.02em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .steps-leds{display:flex; gap:8px; padding:14px 16px 0; align-items:center;}
  .steps-leds .led{width:8px; height:8px; border-radius:2px; background:var(--line-strong); transition:background .2s;}
  .steps-leds .led.done{background:var(--accent-2);}
  .steps-leds .led.active{background:var(--accent); box-shadow:0 0 0 3px var(--accent-soft);}
  .steps-leds .led-label{margin-left:auto; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--ink-faint);}
  .wizard-body{flex:1; overflow-y:auto; padding:18px 16px 12px;}
  .wizard-foot{
    padding:12px 16px calc(14px + var(--safe-bottom));
    background:var(--surface); border-top:1px solid var(--line);
  }
  .step-eyebrow{font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700; color:var(--accent); text-transform:uppercase; letter-spacing:.08em; margin-bottom:6px;}
  .step-title{font-size:21px; margin-bottom:18px; color:var(--ink);}

  /* ---------- Form elements ---------- */
  .field{margin-bottom:14px;}
  .field label{display:block; font-family:'JetBrains Mono',monospace; font-size:11.5px; font-weight:600; color:var(--ink-soft); margin-bottom:7px; text-transform:uppercase; letter-spacing:.03em;}
  .field input, .field textarea{
    width:100%; padding:13px 14px; border-radius:var(--radius-sm);
    border:1px solid var(--line-strong); background:var(--surface-3); color:var(--ink);
  }
  .field input::placeholder, .field textarea::placeholder{color:var(--ink-faint);}
  .field input:focus, .field textarea:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft);}
  .field-row{display:flex; gap:10px;}
  .field-row .field{flex:1;}
  input[type="date"]{color-scheme: dark;}

  .option-card{
    display:flex; align-items:center; gap:12px; padding:15px;
    border:1px solid var(--line-strong); border-radius:var(--radius-sm);
    margin-bottom:10px; background:var(--surface-2);
  }
  .option-card.selected{border-color:var(--accent); background:var(--accent-soft);}
  .option-card .oc-icon{
    width:38px; height:38px; border-radius:8px; background:var(--surface-3);
    display:flex; align-items:center; justify-content:center; flex:0 0 auto; color:var(--ink-soft);
  }
  .option-card.selected .oc-icon{background:var(--accent); color:#15130A;}
  .option-card svg{width:18px; height:18px;}
  .oc-title{font-weight:700; font-size:14.5px;}
  .oc-sub{font-size:12px; color:var(--ink-soft); margin-top:1px; font-family:'JetBrains Mono',monospace;}

  .avail-note{
    display:flex; align-items:center; gap:9px; padding:12px 13px;
    border-radius:var(--radius-sm); background:var(--accent-2-soft); color:var(--accent-2);
    font-family:'JetBrains Mono',monospace; font-size:12.5px; font-weight:600; margin-top:4px;
    border:1px solid rgba(56,168,157,.3);
  }
  .avail-note.warn{background:var(--warn-soft); color:var(--warn); border-color:rgba(217,131,36,.3);}
  .avail-note.bad{background:var(--danger-soft); color:var(--danger); border-color:rgba(229,72,77,.3);}
  .avail-note svg{width:15px; height:15px; flex:0 0 auto;}

  /* ---------- Summary (confirm step) ---------- */
  .summary-card{background:var(--surface-2); border:1px solid var(--line-strong); border-radius:var(--radius); padding:4px 15px; margin-bottom:12px;}
  .summary-row{display:flex; justify-content:space-between; align-items:center; gap:10px; padding:12px 0; border-bottom:1px solid var(--line);}
  .summary-row:last-child{border-bottom:none;}
  .summary-row .k{font-size:12.5px; color:var(--ink-soft); font-family:'JetBrains Mono',monospace;}
  .summary-row .v{font-size:13.5px; font-weight:600; text-align:right;}
  .summary-total{display:flex; justify-content:space-between; align-items:baseline; padding:15px; background:var(--surface-2); border:1px solid var(--accent); border-radius:var(--radius); margin-bottom:16px;}
  .summary-total .k{font-family:'Chakra Petch',sans-serif; font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.03em; color:var(--ink-soft);}
  .summary-total .v{font-size:23px; font-weight:700; font-family:'JetBrains Mono',monospace; color:var(--accent);}
  .fine-print{font-size:12px; color:var(--ink-faint); line-height:1.55; padding:0 2px;}

  /* ---------- Spec-plate ticket ---------- */
  .ticket-wrap{display:flex; flex-direction:column; align-items:center; padding:8px 0 20px;}
  .plate{
    position:relative; width:100%; max-width:340px;
    background:linear-gradient(155deg, #2A2F35, #1D2126);
    border:1px solid var(--line-strong);
    color:var(--ink);
    border-radius:12px; padding:24px 22px 22px;
    box-shadow:0 14px 30px rgba(0,0,0,.45);
  }
  .rivet{position:absolute; width:7px; height:7px; border-radius:50%; background:var(--rivet); box-shadow:inset 0 1px 1px rgba(0,0,0,.5), 0 1px 0 rgba(255,255,255,.05);}
  .rivet.tl{top:12px; left:12px;} .rivet.tr{top:12px; right:12px;}
  .rivet.bl{bottom:12px; left:12px;} .rivet.br{bottom:12px; right:12px;}
  .plate-eyebrow{font-family:'JetBrains Mono',monospace; font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--accent);}
  .plate-order{font-family:'JetBrains Mono',monospace; font-size:27px; font-weight:700; margin:4px 0 16px; letter-spacing:.02em;}
  .plate-divider{border-top:1px solid var(--line-strong); margin:0 0 14px;}
  .plate-row{display:flex; justify-content:space-between; padding:7px 0; font-size:13px;}
  .plate-row .k{color:var(--ink-faint); font-family:'JetBrains Mono',monospace; font-size:11.5px; text-transform:uppercase; letter-spacing:.02em;}
  .plate-row .v{font-weight:600; text-align:right;}
  .plate-note{
    margin-top:16px; padding-top:14px; border-top:1px solid var(--line-strong);
    font-size:11.5px; color:var(--ink-faint); line-height:1.5;
  }
  .ticket-actions{width:100%; max-width:340px; margin-top:20px;}

  /* ---------- Bottom sheet (Мои брони) ---------- */
  .sheet-scrim{position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:60; opacity:0; pointer-events:none; transition:opacity .2s;}
  .sheet-scrim.open{opacity:1; pointer-events:auto;}
  .sheet{
    position:fixed; left:0; right:0; bottom:0; z-index:61;
    background:var(--bg); border-radius:18px 18px 0 0; border-top:1px solid var(--line-strong);
    max-height:82vh; display:flex; flex-direction:column;
    transform:translateY(100%); transition:transform .28s cubic-bezier(.2,.8,.2,1);
  }
  .sheet.open{transform:translateY(0);}
  .sheet-handle{width:36px; height:4px; border-radius:3px; background:var(--line-strong); margin:10px auto 4px;}
  .sheet-head{padding:6px 18px 12px; display:flex; align-items:center; justify-content:space-between;}
  .sheet-head h3{font-family:'Chakra Petch',sans-serif; text-transform:uppercase; letter-spacing:.02em; font-size:15px; margin:0;}
  .sheet-body{overflow-y:auto; padding:0 16px calc(20px + var(--safe-bottom));}

  .booking-row{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-sm);
    padding:13px 14px; margin-bottom:10px;
  }
  .booking-row-top{display:flex; justify-content:space-between; align-items:flex-start; gap:8px;}
  .booking-model{font-weight:700; font-size:14px;}
  .booking-dates{font-size:11.5px; color:var(--ink-soft); margin-top:3px; font-family:'JetBrains Mono',monospace;}
  .status-chip{font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:700; padding:3px 8px; border-radius:5px; white-space:nowrap; text-transform:uppercase;}
  .status-chip.active{background:var(--accent-2-soft); color:var(--accent-2);}
  .status-chip.overdue{background:var(--danger-soft); color:var(--danger);}
  .status-chip.returned{background:var(--surface-3); color:var(--ink-faint);}
  .empty-state{text-align:center; padding:50px 20px; color:var(--ink-faint);}
  .empty-state svg{width:38px; height:38px; margin-bottom:10px; opacity:.5;}

  /* ---------- Loading ---------- */
  .loading-screen{
    position:fixed; inset:0; background:var(--bg); z-index:100;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
  }
  .spinner{width:24px; height:24px; border-radius:4px; border:3px solid var(--line-strong); border-top-color:var(--accent); animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-screen span{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--ink-faint); text-transform:uppercase; letter-spacing:.06em;}

  .toast{
    position:fixed; left:16px; right:16px; bottom:calc(20px + var(--safe-bottom));
    background:var(--surface-3); border:1px solid var(--line-strong); color:var(--ink); padding:13px 16px; border-radius:10px;
    font-size:13.5px; font-weight:600; z-index:200;
    transform:translateY(120%); transition:transform .25s ease;
    display:flex; align-items:center; gap:8px;
  }
  .toast.show{transform:translateY(0);}
</style>
</head>
<body>

<div class="power-rail"></div>

<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
  <span>Инициализация…</span>
</div>

<div id="app" style="display:none;">

  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
      </div>
      <div style="min-width:0;">
        <div class="brand-name" id="brandName">Прокат-Инструмент</div>
        <div class="brand-sub" id="brandSub">MINSK / BY</div>
      </div>
    </div>
    <div class="topbar-actions">
      <button class="icon-btn" id="callBtn" aria-label="Позвонить">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      </button>
      <button class="icon-btn has-dot" id="myBookingsBtn" aria-label="Мои брони">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      </button>
    </div>
  </div>

  <div class="screen">
    <div class="section-label">Категории</div>
    <div class="seg-row" id="segRow"></div>

    <div class="section-label">Инвентарь</div>
    <div class="model-list" id="modelList"></div>
  </div>
</div>

<!-- ===================== WIZARD ===================== -->
<div class="wizard" id="wizard">
  <div class="wizard-head">
    <button class="icon-btn" id="wizardBack" aria-label="Назад">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <div class="wizard-title" id="wizardModelName">Бронирование</div>
    <button class="icon-btn" id="wizardClose" aria-label="Закрыть">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="steps-leds" id="stepsLeds"></div>
  <div class="wizard-body" id="wizardBody"></div>
  <div class="wizard-foot" id="wizardFoot">
    <button class="btn btn-primary" id="wizardNext">Далее</button>
  </div>
</div>

<!-- ===================== МОИ БРОНИ SHEET ===================== -->
<div class="sheet-scrim" id="sheetScrim"></div>
<div class="sheet" id="bookingsSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-head">
    <h3>Мои брони</h3>
    <button class="icon-btn" id="sheetClose">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="sheet-body" id="bookingsList"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   CONFIG
   ============================================================ */
const DEMO_CONFIG = {
  businessName: "Прокат-Инструмент",
  city: "MINSK / BY",
  phone: "+375291234567",
  apiUrl: "PASTE_APPS_SCRIPT_URL_HERE",
  pickupPoints: [
    { id: "p1", name: "Склад на Промышленной, 12", hours: "9:00–19:00" }
  ],
  deliveryZones: [
    { id: "z1", name: "В пределах МКАД", fee: 15 },
    { id: "z2", name: "За МКАД (до 20 км)", fee: 30 }
  ]
};
let CONFIG = DEMO_CONFIG;

/* ============================================================
   MOCK DATA
   ============================================================ */
const MOCK_CATEGORIES = [
  { id: "all", name: "ВСЁ" },
  { id: "elec", name: "ЭЛЕКТРО" },
  { id: "build", name: "СТРОЙКА" },
  { id: "garden", name: "САД" },
  { id: "measure", name: "ЗАМЕР" }
];

const MOCK_MODELS = [
  { id: "m1", name: "Перфоратор Bosch GBH 2-26", cat: "elec", price: 25, totalQty: 5, icon: "drill" },
  { id: "m2", name: "Болгарка Makita 230мм", cat: "elec", price: 18, totalQty: 4, icon: "grinder" },
  { id: "m3", name: "Бетономешалка 130л", cat: "build", price: 40, totalQty: 2, icon: "mixer" },
  { id: "m4", name: "Строительные леса 4×2м", cat: "build", price: 35, totalQty: 3, icon: "scaffold" },
  { id: "m5", name: "Триммер бензиновый", cat: "garden", price: 22, totalQty: 6, icon: "trimmer" },

  { id: "m8", name: "Штроборез", cat: "build", price: 30, totalQty: 2, icon: "cutter" }
];

const MOCK_BUSY = {
  m1: [{ from: "2026-07-21", to: "2026-07-23", qty: 3 }],
  m3: [{ from: "2026-07-19", to: "2026-07-25", qty: 1 }]
};

let MOCK_MY_BOOKINGS = [
  { id: "ЗК-1042", modelId: "m2", model: "Болгарка Makita 230мм", from: "2026-07-15", to: "2026-07-18", status: "returned", method: "Самовывоз" },
  { id: "ЗК-1051", modelId: "m5", model: "Триммер бензиновый", from: "2026-07-17", to: "2026-07-20", status: "overdue", method: "Доставка" }
];

/* ============================================================
   api(action, payload) — единая точка входа.
   Сейчас мок; при подключении реального apiUrl тело меняется
   на fetch(CONFIG.apiUrl, {method:'POST', body:...})
   ============================================================ */
function api(action, payload) {
  return new Promise((resolve) => {
    setTimeout(() => {
      switch (action) {
        case "getModels":
          resolve({ ok: true, categories: MOCK_CATEGORIES, models: MOCK_MODELS });
          break;
        case "checkAvailability": {
          const { modelId, from, to } = payload;
          const model = MOCK_MODELS.find(m => m.id === modelId);
          const busy = (MOCK_BUSY[modelId] || []).filter(b => rangesOverlap(from, to, b.from, b.to));
          const busyQty = busy.reduce((s, b) => s + b.qty, 0);
          const free = Math.max(0, model.totalQty - busyQty);
          resolve({ ok: true, free, total: model.totalQty });
          break;
        }
        case "createBooking":
          const orderId = "ЗК-" + (1050 + Math.floor(Math.random() * 900));
          MOCK_MY_BOOKINGS.unshift({
            id: orderId, modelId: payload.modelId, model: payload.modelName,
            from: payload.from, to: payload.to, status: "active",
            method: payload.method === "delivery" ? "Доставка" : "Самовывоз"
          });
          resolve({ ok: true, orderId });
          break;
        case "getMyBookings":
          resolve({ ok: true, bookings: MOCK_MY_BOOKINGS });
          break;
        default:
          resolve({ ok: false, error: "unknown action" });
      }
    }, 260);
  });
}
function rangesOverlap(aFrom, aTo, bFrom, bTo) { return aFrom <= bTo && bFrom <= aTo; }

/* ============================================================
   TELEGRAM BOOTSTRAP
   ============================================================ */
const tg = window.Telegram ? window.Telegram.WebApp : null;
function haptic(style) {
  if (tg && tg.HapticFeedback) {
    if (["success", "error", "warning"].includes(style)) tg.HapticFeedback.notificationOccurred(style);
    else tg.HapticFeedback.impactOccurred(style || "light");
  }
}
function setChrome() {
  if (!tg) return;
  const s = getComputedStyle(document.body);
  try {
    tg.setHeaderColor(s.getPropertyValue("--surface").trim());
    tg.setBackgroundColor(s.getPropertyValue("--bg").trim());
  } catch (e) {}
}
function initTelegram() { if (!tg) return; tg.ready(); tg.expand(); setChrome(); }

/* ============================================================
   ICONS
   ============================================================ */

  drill: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 12l6-3v6l-6-3z"/><path d="M8 10.5h9a2 2 0 0 1 2 2v0a2 2 0 0 1-2 2H8"/><path d="M19 10.5l3-1v5l-3-1"/></svg>',
  grinder: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="8" cy="12" r="5"/><path d="M13 12h9M17 9v6"/></svg>',
  mixer: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="14" r="6"/><path d="M9 8l1.5-4h3L15 8"/></svg>',
  scaffold: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 4v16M20 4v16M4 9h16M4 15h16M4 4l16 16M20 4L4 20"/></svg>',
  trimmer: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 20l9-9M17 3l4 4-9 9-4-4z"/></svg>',
  mower: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/><path d="M7 17h6l4-9H9"/></svg>',
  level: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="10" width="18" height="5" rx="1"/><circle cx="12" cy="12.5" r="1.6"/></svg>',
  cutter: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 17l7-7M14 6l4 4-10 10-4-4z"/></svg>'
};

/* ============================================================
   STATE
   ============================================================ */
const state = {
  categories: [], models: [], activeCat: "all",
  wizard: { step: 1, model: null, from: "", to: "", method: "pickup", address: "", name: "", phone: "", idDoc: "", freeQty: null }
};

/* ============================================================
   CATALOG RENDER
   ============================================================ */
function renderSegs() {
  const row = document.getElementById("segRow");
  row.innerHTML = state.categories.map(c => `<button class="seg ${c.id === state.activeCat ? "active" : ""}" data-cat="${c.id}">${c.name}</button>`).join("");
  row.querySelectorAll(".seg").forEach(el => el.addEventListener("click", () => {
    state.activeCat = el.dataset.cat; haptic("light"); renderSegs(); renderModels();
  }));
}

function renderModels() {
  const list = document.getElementById("modelList");
  const items = state.models.filter(m => state.activeCat === "all" || m.cat === state.activeCat);
  list.innerHTML = items.map(m => {
    let cls = "", label = `${m.totalQty} ЕД. В НАЛИЧИИ`;
    if (m.totalQty <= 2) { cls = "low"; label = `ОСТАЛОСЬ ${m.totalQty}`; }
    return `
    <button class="model-row" data-id="${m.id}">
      <div class="model-icon">${TOOL_ICONS[m.icon] || ""}</div>
      <div class="model-mid">
        <div class="model-name">${m.name}</div>
        <div class="model-cat">${categoryName(m.cat)}</div>
      </div>
      <div class="model-right">
        <div class="model-price">${m.price} р.<span>/ сутки</span></div>
        <div class="stock-readout ${cls}"><i></i>${label}</div>
      </div>
    </button>`;
  }).join("");
  list.querySelectorAll(".model-row").forEach(el => el.addEventListener("click", () => openWizard(el.dataset.id)));
}
function categoryName(id) { const c = state.categories.find(c => c.id === id); return c ? c.name : ""; }

/* ============================================================
   WIZARD
   ============================================================ */
const TOTAL_STEPS = 4;
const STEP_NAMES = ["ДАТЫ", "ПОЛУЧЕНИЕ", "КОНТАКТЫ", "ИТОГ"];

function openWizard(modelId) {
  const model = state.models.find(m => m.id === modelId);
  state.wizard = { step: 1, model, from: "", to: "", method: "pickup", address: "", name: "", phone: "", idDoc: "", freeQty: null };
  document.getElementById("wizardModelName").textContent = model.name;
  document.getElementById("wizard").classList.add("open");
  haptic("light");
  renderWizard();
}
function closeWizard() { document.getElementById("wizard").classList.remove("open"); }

function renderLeds() {
  const wrap = document.getElementById("stepsLeds");
  const step = Math.min(state.wizard.step, TOTAL_STEPS);
  wrap.style.display = state.wizard.step > TOTAL_STEPS ? "none" : "flex";
  wrap.innerHTML = Array.from({ length: TOTAL_STEPS }).map((_, i) => {
    const n = i + 1;
    let cls = ""; if (n < step) cls = "done"; if (n === step) cls = "active";
    return `<span class="led ${cls}"></span>`;
  }).join("") + `<span class="led-label">${String(step).padStart(2,"0")}/${String(TOTAL_STEPS).padStart(2,"0")} · ${STEP_NAMES[step-1]}</span>`;
}

function renderWizard() {
  renderLeds();
  const body = document.getElementById("wizardBody");
  const foot = document.getElementById("wizardFoot");
  const w = state.wizard;

  if (w.step === 1) {
    body.innerHTML = `
      <div class="step-eyebrow">Шаг 1 из ${TOTAL_STEPS}</div>
      <h2 class="step-title">На какие даты?</h2>
      <div class="field-row">
        <div class="field"><label>Выдача</label><input type="date" id="dateFrom" value="${w.from}"></div>
        <div class="field"><label>Возврат</label><input type="date" id="dateTo" value="${w.to}"></div>
      </div>
      <div id="availBlock"></div>
    `;
    const from = document.getElementById("dateFrom"), to = document.getElementById("dateTo");
    const check = async () => {
      w.from = from.value; w.to = to.value;
      const availBlock = document.getElementById("availBlock");
      if (!w.from || !w.to || w.to < w.from) { availBlock.innerHTML = ""; setNextEnabled(false); return; }
      availBlock.innerHTML = `<div class="avail-note">ПРОВЕРКА ОСТАТКА…</div>`;
      const res = await api("checkAvailability", { modelId: w.model.id, from: w.from, to: w.to });
      w.freeQty = res.free;
      if (res.free <= 0) { availBlock.innerHTML = `<div class="avail-note bad">НА ЭТИ ДАТЫ ВСЁ ЗАНЯТО — ВЫБЕРИТЕ ДРУГОЙ ПЕРИОД</div>`; setNextEnabled(false); }
      else if (res.free <= 1) { availBlock.innerHTML = `<div class="avail-note warn">ОСТАЛСЯ ПОСЛЕДНИЙ ЭКЗЕМПЛЯР</div>`; setNextEnabled(true); }
      else { availBlock.innerHTML = `<div class="avail-note">ДОСТУПНО ${res.free} ИЗ ${res.total}</div>`; setNextEnabled(true); }
    };
    from.addEventListener("change", check); to.addEventListener("change", check);
    setNextEnabled(!!(w.from && w.to));
  }

  if (w.step === 2) {
    body.innerHTML = `
      <div class="step-eyebrow">Шаг 2 из ${TOTAL_STEPS}</div>
      <h2 class="step-title">Как получите инструмент?</h2>
      <button class="option-card ${w.method === "pickup" ? "selected" : ""}" data-method="pickup">
        <div class="oc-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-6 9 6v11a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1z"/></svg></div>
        <div><div class="oc-title">Самовывоз</div><div class="oc-sub">${CONFIG.pickupPoints[0]?.name || ""}</div></div>
      </button>
      <button class="option-card ${w.method === "delivery" ? "selected" : ""}" data-method="delivery">
        <div class="oc-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7h11v9H3zM14 10h4l3 3v3h-7z"/><circle cx="7" cy="18" r="1.6"/><circle cx="17.5" cy="18" r="1.6"/></svg></div>
        <div><div class="oc-title">Доставка</div><div class="oc-sub">По городу и области</div></div>
      </button>
      <div id="methodExtra"></div>
    `;
    renderMethodExtra();
    body.querySelectorAll(".option-card").forEach(el => el.addEventListener("click", () => { w.method = el.dataset.method; haptic("light"); renderWizard(); }));
    setNextEnabled(w.method === "pickup" || (w.method === "delivery" && w.address.trim().length > 4));
  }

  if (w.step === 3) {
    body.innerHTML = `
      <div class="step-eyebrow">Шаг 3 из ${TOTAL_STEPS}</div>
      <h2 class="step-title">Контакты для договора</h2>
      <div class="field"><label>Имя и фамилия</label><input type="text" id="fName" placeholder="Иван Петров" value="${w.name}"></div>
      <div class="field"><label>Телефон</label><input type="tel" id="fPhone" placeholder="+375 29 000 00 00" value="${w.phone}"></div>
      <div class="field"><label>Паспортные данные</label><input type="text" id="fId" placeholder="Серия, номер" value="${w.idDoc}"></div>
    `;
    const upd = () => {
      w.name = document.getElementById("fName").value; w.phone = document.getElementById("fPhone").value; w.idDoc = document.getElementById("fId").value;
      setNextEnabled(w.name.trim().length > 2 && w.phone.trim().length > 5 && w.idDoc.trim().length > 3);
    };
    ["fName", "fPhone", "fId"].forEach(id => document.getElementById(id).addEventListener("input", upd));
    setNextEnabled(w.name.trim().length > 2 && w.phone.trim().length > 5 && w.idDoc.trim().length > 3);
  }

  if (w.step === 4) {
    const days = dayCount(w.from, w.to);
    const rentSum = days * w.model.price;
    const deliveryFee = w.method === "delivery" ? (CONFIG.deliveryZones[0]?.fee || 0) : 0;
    const total = rentSum + deliveryFee;
    body.innerHTML = `
      <div class="step-eyebrow">Шаг 4 из ${TOTAL_STEPS}</div>
      <h2 class="step-title">Проверьте и подтвердите</h2>
      <div class="summary-card">
        <div class="summary-row"><div class="k">ИНСТРУМЕНТ</div><div class="v">${w.model.name}</div></div>
        <div class="summary-row"><div class="k">ПЕРИОД</div><div class="v mono">${fmtDate(w.from)} — ${fmtDate(w.to)}</div></div>
        <div class="summary-row"><div class="k">СРОК</div><div class="v">${days} ${pluralDays(days)}</div></div>
        <div class="summary-row"><div class="k">ПОЛУЧЕНИЕ</div><div class="v">${w.method === "pickup" ? "Самовывоз" : "Доставка"}</div></div>
        <div class="summary-row"><div class="k">ПОЛУЧАТЕЛЬ</div><div class="v">${w.name}</div></div>
      </div>
      <div class="summary-card">
        <div class="summary-row"><div class="k">АРЕНДА ${days} × ${w.model.price} Р.</div><div class="v">${rentSum} р.</div></div>
        ${deliveryFee ? `<div class="summary-row"><div class="k">ДОСТАВКА</div><div class="v">${deliveryFee} р.</div></div>` : ""}
      </div>
      <div class="summary-total"><div class="k">Итого</div><div class="v">${total} р.</div></div>
      <div class="fine-print">После оформления в чат придут договор и чек об оплате отдельными файлами. Оплата — при получении инструмента.</div>
    `;
    foot.querySelector("#wizardNext").textContent = "Оформить бронь";
    setNextEnabled(true);
  }

  if (w.step === 5) {
    foot.style.display = "none";
    body.innerHTML = renderTicket();
    const doneBtn = body.querySelector("#ticketDone");
    if (doneBtn) doneBtn.addEventListener("click", closeWizard);
    return;
  }
  foot.style.display = "block";
}

function renderMethodExtra() {
  const w = state.wizard;
  const el = document.getElementById("methodExtra");
  if (!el) return;
  if (w.method === "delivery") {
    el.innerHTML = `<div class="field" style="margin-top:6px;"><label>Адрес доставки</label><textarea id="fAddress" rows="2" placeholder="Улица, дом, подъезд, этаж">${w.address}</textarea></div>`;
    document.getElementById("fAddress").addEventListener("input", (e) => { w.address = e.target.value; setNextEnabled(w.address.trim().length > 4); });
  } else { el.innerHTML = ""; }
}

function setNextEnabled(enabled) { const btn = document.getElementById("wizardNext"); if (btn) btn.disabled = !enabled; }
function dayCount(from, to) { const a = new Date(from), b = new Date(to); return Math.max(1, Math.round((b - a) / 86400000) + 1); }
function fmtDate(iso) { if (!iso) return ""; const d = new Date(iso); return d.toLocaleDateString("ru-RU", { day: "2-digit", month: "2-digit", year: "numeric" }); }
function pluralDays(n) {
  const mod10 = n % 10, mod100 = n % 100;
  if (mod10 === 1 && mod100 !== 11) return "сутки";
  if ([2, 3, 4].includes(mod10) && ![12, 13, 14].includes(mod100)) return "суток";
  return "суток";
}

let lastOrderId = null;
function renderTicket() {
  const w = state.wizard;
  return `
    <div class="ticket-wrap">
      <div class="plate">
        <span class="rivet tl"></span><span class="rivet tr"></span><span class="rivet bl"></span><span class="rivet br"></span>
        <div class="plate-eyebrow">Заявка принята</div>
        <div class="plate-order mono">${lastOrderId || "…"}</div>
        <div class="plate-divider"></div>
        <div class="plate-row"><div class="k">Инструмент</div><div class="v">${w.model.name}</div></div>
        <div class="plate-row"><div class="k">Выдача</div><div class="v mono">${fmtDate(w.from)}</div></div>
        <div class="plate-row"><div class="k">Возврат</div><div class="v mono">${fmtDate(w.to)}</div></div>
        <div class="plate-row"><div class="k">Получение</div><div class="v">${w.method === "pickup" ? "Самовывоз" : "Доставка"}</div></div>
        <div class="plate-note">Договор и чек об оплате отправлены отдельными сообщениями в этот чат. Оплата — при получении.</div>
      </div>
      <div class="ticket-actions"><button class="btn btn-primary" id="ticketDone">Готово</button></div>
    </div>
  `;
}

document.getElementById("wizardNext").addEventListener("click", async () => {
  const w = state.wizard;
  if (w.step === 4) {
    document.getElementById("wizardNext").disabled = true;
    document.getElementById("wizardNext").textContent = "Оформляем…";
    const res = await api("createBooking", { modelId: w.model.id, modelName: w.model.name, from: w.from, to: w.to, method: w.method });
    lastOrderId = res.orderId;
    haptic("success");
    w.step = 5; renderWizard();
    return;
  }
  haptic("light"); w.step++; renderWizard();
});
document.getElementById("wizardBack").addEventListener("click", () => {
  const w = state.wizard;
  if (w.step <= 1) { closeWizard(); return; }
  haptic("light"); w.step--; document.getElementById("wizardFoot").style.display = "block"; renderWizard();
});
document.getElementById("wizardClose").addEventListener("click", closeWizard);

/* ============================================================
   МОИ БРОНИ
   ============================================================ */
function openBookingsSheet() { document.getElementById("sheetScrim").classList.add("open"); document.getElementById("bookingsSheet").classList.add("open"); haptic("light"); loadBookings(); }
function closeBookingsSheet() { document.getElementById("sheetScrim").classList.remove("open"); document.getElementById("bookingsSheet").classList.remove("open"); }
async function loadBookings() {
  const list = document.getElementById("bookingsList");
  list.innerHTML = `<div class="empty-state"><div class="spinner" style="margin:0 auto 10px;"></div>Загружаем…</div>`;
  const res = await api("getMyBookings", {});
  if (!res.bookings.length) {
    list.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><div>Пока нет броней</div></div>`;
    return;
  }
  const statusLabel = { active: "В аренде", overdue: "Просрочено", returned: "Возвращено" };
  list.innerHTML = res.bookings.map(b => `
    <div class="booking-row">
      <div class="booking-row-top">
        <div><div class="booking-model">${b.model}</div><div class="booking-dates">${fmtDate(b.from)} — ${fmtDate(b.to)} · ${b.method}</div></div>
        <span class="status-chip ${b.status}">${statusLabel[b.status]}</span>
      </div>
    </div>`).join("");
}
document.getElementById("myBookingsBtn").addEventListener("click", openBookingsSheet);
document.getElementById("sheetClose").addEventListener("click", closeBookingsSheet);
document.getElementById("sheetScrim").addEventListener("click", closeBookingsSheet);

document.getElementById("callBtn").addEventListener("click", () => {
  if (tg && tg.openLink) tg.openLink("tel:" + CONFIG.phone); else window.location.href = "tel:" + CONFIG.phone;
});

/* ============================================================
   INIT
   ============================================================ */
async function init() {
  initTelegram();
  document.getElementById("brandName").textContent = CONFIG.businessName;
  document.getElementById("brandSub").textContent = CONFIG.city;
  const res = await api("getModels", {});
  state.categories = res.categories; state.models = res.models;
  renderSegs(); renderModels();
  document.getElementById("loadingScreen").style.display = "none";
  document.getElementById("app").style.display = "block";
}
init();
</script>
